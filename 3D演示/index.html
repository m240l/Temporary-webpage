<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>超薄相框 3D 查看器</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0f0f0f;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #eee;
    }
    #controls {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.75);
      padding: 16px;
      border-radius: 8px;
      z-index: 10;
      width: 300px;
      box-sizing: border-box;
      pointer-events: auto;
    }
    #controls h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    #controls label {
      display: block;
      margin: 12px 0 4px;
      font-size: 13px;
      font-weight: bold;
    }
    #controls select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      font-size: 14px;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 8px 0;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 6px;
      background: #222;
      border: 1px solid #444;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .radio-group label:hover {
      background: #333;
    }
    .radio-group input[type="radio"]:checked + span {
      font-weight: bold;
      color: #4fc3f7;
    }
    .radio-group input[type="radio"] {
      margin-right: 10px;
      accent-color: #4fc3f7;
    }
    #controls small {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.8;
    }
    canvas { display: block; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="controls">
    <h3>超薄相框查看器</h3>
    <p style="margin:8px 0 16px;font-size:13px;">鼠标左键旋转 | 滚轮缩放 | 右键平移</p>

    <label>是否带钥匙扣</label>
    <div class="radio-group">
      <label>
        <input type="radio" name="keychain" value="yes" checked>
        <span>带钥匙扣</span>
      </label>
      <label>
        <input type="radio" name="keychain" value="no">
        <span>不带钥匙扣</span>
      </label>
    </div>

    <label for="sizeSelect">玻璃尺寸</label>
    <select id="sizeSelect">
      <option value="25x76">25.4 × 76.2 mm</option>
      <option value="65x65">65 × 65 mm</option>
    </select>

    <label for="typeSelect">耗材类型</label>
    <select id="typeSelect"></select>

    <label for="colorSelect">颜色</label>
    <select id="colorSelect"></select>

    <small id="modelInfo">加载中...</small>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';

    // 模型路径统一改到 stl/ 文件夹下（相对路径）
    const modelMap = {
      "25x76_yes": {
        file: "stl/mini_keychain_25x76.stl",
        desc: "带钥匙扣 · 玻璃尺寸 25.4 × 76.2 mm · 厚度 3mm"
      },
      "25x76_no": {
        file: "stl/mini_frame_25x76.stl",
        desc: "无钥匙扣 · 玻璃尺寸 25.4 × 76.2 mm · 厚度 3mm"
      },
      "65x65_yes": {
        file: "stl/square_keychain_65.stl",
        desc: "带钥匙扣 · 玻璃尺寸 65 × 65 mm · 厚度 3mm"
      },
      "65x65_no": {
        file: "stl/square_frame_65.stl",
        desc: "无钥匙扣 · 玻璃尺寸 65 × 65 mm · 厚度 3mm"
      }
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.12;
    controls.rotateSpeed = 0.9;

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.8);
    dirLight1.position.set(100, 140, 120);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight2.position.set(-90, 110, -90);
    scene.add(dirLight2);

    const pointLight = new THREE.PointLight(0xffffff, 2.0, 500);
    pointLight.position.set(60, 120, 80);
    scene.add(pointLight);

    let currentMesh = null;
    let currentMaterial = null;

    function createMaterial(colorHex = 0xffffff) {
      return new THREE.MeshPhysicalMaterial({
        color: new THREE.Color(colorHex),
        metalness: 0.0,
        roughness: 0.10,
        clearcoat: 0.92,
        clearcoatRoughness: 0.04,
        transmission: 0,
        transparent: false,
        opacity: 1.0,
        side: THREE.DoubleSide
      });
    }
    currentMaterial = createMaterial();

    function loadFrame(size, hasKeychain) {
      if (currentMesh) {
        scene.remove(currentMesh);
        currentMesh.geometry.dispose();
        currentMesh = null;
      }

      const key = `${size}_${hasKeychain}`;
      const model = modelMap[key];

      if (!model) {
        document.getElementById('modelInfo').textContent = '模型配置无效';
        return;
      }

      document.getElementById('modelInfo').textContent = model.desc + '（加载中...）';

      const loader = new STLLoader();
      loader.load(
        model.file,
        (geometry) => {
          geometry.computeVertexNormals();
          currentMesh = new THREE.Mesh(geometry, currentMaterial);
          geometry.computeBoundingBox();
          const center = new THREE.Vector3();
          geometry.boundingBox.getCenter(center);
          currentMesh.position.copy(center).multiplyScalar(-1);
          scene.add(currentMesh);
          camera.position.set(80, 60, 100);
          controls.target.set(0, 0, 0);
          controls.update();
          document.getElementById('modelInfo').textContent = model.desc + '（已加载）';
        },
        undefined,
        (err) => {
          console.error('加载失败:', model.file, err);
          document.getElementById('modelInfo').textContent = `加载失败：${model.file}`;
        }
      );
    }

    function updateModel() {
      const size = document.getElementById('sizeSelect').value;
      const hasKeychain = document.querySelector('input[name="keychain"]:checked').value === 'yes' ? 'yes' : 'no';
      loadFrame(size, hasKeychain);
    }

    document.getElementById('sizeSelect').addEventListener('change', updateModel);
    document.querySelectorAll('input[name="keychain"]').forEach(radio => {
      radio.addEventListener('change', updateModel);
    });

    let filaments = null;
    fetch('Bambu.json')
      .then(r => r.ok ? r.json() : Promise.reject('读取失败'))
      .then(data => {
        filaments = data;
        const typeSelect = document.getElementById('typeSelect');
        Object.keys(data).forEach(type => {
          const opt = document.createElement('option');
          opt.value = type;
          opt.textContent = type;
          typeSelect.appendChild(opt);
        });
        if (typeSelect.options.length > 0) {
          typeSelect.selectedIndex = 0;
          typeSelect.dispatchEvent(new Event('change'));
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById('typeSelect').innerHTML = '<option>颜色数据加载失败</option>';
      });

    document.getElementById('typeSelect').addEventListener('change', () => {
      const type = document.getElementById('typeSelect').value;
      const colorSelect = document.getElementById('colorSelect');
      colorSelect.innerHTML = '';
      if (filaments && filaments[type]) {
        filaments[type].forEach(item => {
          const opt = document.createElement('option');
          opt.value = item['rgb色值'];
          opt.textContent = item['颜色'];
          colorSelect.appendChild(opt);
        });
        if (colorSelect.options.length > 0) {
          colorSelect.selectedIndex = 0;
          updateColor(colorSelect.value);
        }
      }
    });

    document.getElementById('colorSelect').addEventListener('change', e => {
      updateColor(e.target.value);
    });

    function updateColor(hex) {
      if (currentMaterial && hex) {
        currentMaterial.color.set(hex);
        currentMaterial.needsUpdate = true;
      }
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // 初始加载
    updateModel();
  </script>
</body>
</html>
