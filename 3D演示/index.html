<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>超薄相框 3D 查看器</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0f0f0f;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #eee;
    }
    #controls {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.75);
      padding: 16px;
      border-radius: 8px;
      z-index: 10;
      width: 300px;
      box-sizing: border-box;
      pointer-events: auto;
    }
    #controls h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    #controls label {
      display: block;
      margin: 12px 0 4px;
      font-size: 13px;
      font-weight: bold;
    }
    #controls select {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      font-size: 14px;
    }
    #controls small {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.8;
    }
    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="controls">
    <h3>超薄相框查看器</h3>
    <p style="margin:8px 0 16px;font-size:13px;">鼠标左键旋转 | 滚轮缩放 | 右键平移</p>

    <label for="modelSelect">相框型号</label>
    <select id="modelSelect"></select>

    <label for="typeSelect">耗材类型</label>
    <select id="typeSelect"></select>

    <label for="colorSelect">颜色</label>
    <select id="colorSelect"></select>

    <small id="modelInfo"></small>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';

    // ── 四个相框模型（中文名称） ───────────────────────────────────────────────
    const frames = [
      {
        name: "小钥匙扣相框 25x76",
        file: "mini_keychain_25x76.stl",  // ← 替换成你的实际文件名
        desc: "带钥匙扣 · 玻璃尺寸 25.4 × 76.2 mm · 厚度 3mm"
      },
      {
        name: "小型相框 25x76",
        file: "mini_frame_25x76.stl",
        desc: "无钥匙扣 · 玻璃尺寸 25.4 × 76.2 mm · 厚度 3mm"
      },
      {
        name: "方形钥匙扣相框 65",
        file: "square_keychain_65.stl",
        desc: "带钥匙扣 · 玻璃尺寸 65 × 65 mm · 厚度 3mm"
      },
      {
        name: "方形相框 65",
        file: "square_frame_65.stl",
        desc: "无钥匙扣 · 玻璃尺寸 65 × 65 mm · 厚度 3mm"
      }
    ];

    // ── Three.js 基础设置 ────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.12;
    controls.rotateSpeed = 0.9;

    // ── 灯光（修正写法） ─────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.8);
    dirLight1.position.set(100, 140, 120);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight2.position.set(-90, 110, -90);
    scene.add(dirLight2);

    const pointLight = new THREE.PointLight(0xffffff, 2.0, 500);
    pointLight.position.set(60, 120, 80);
    scene.add(pointLight);

    let currentMesh = null;
    let currentMaterial = null;

    // ── 创建材质（不透光 + 光泽塑料） ────────────────────────────────────
    function createMaterial(colorHex = 0xffffff) {
      return new THREE.MeshPhysicalMaterial({
        color: new THREE.Color(colorHex),
        metalness: 0.0,
        roughness: 0.10,
        clearcoat: 0.92,
        clearcoatRoughness: 0.04,
        transmission: 0,
        transparent: false,
        opacity: 1.0,
        side: THREE.DoubleSide
      });
    }

    currentMaterial = createMaterial();

    // ── 加载模型函数 ─────────────────────────────────────────────────────
    function loadFrame(index) {
      if (currentMesh) {
        scene.remove(currentMesh);
        currentMesh.geometry.dispose();
        currentMesh = null;
      }

      const frame = frames[index];
      document.getElementById('modelInfo').textContent = frame.desc;

      const loader = new STLLoader();
      loader.load(
        frame.file,
        (geometry) => {
          geometry.computeVertexNormals();

          currentMesh = new THREE.Mesh(geometry, currentMaterial);

          geometry.computeBoundingBox();
          const center = new THREE.Vector3();
          geometry.boundingBox.getCenter(center);
          currentMesh.position.copy(center).multiplyScalar(-1);

          scene.add(currentMesh);

          camera.position.set(80, 60, 100);
          controls.target.set(0, 0, 0);
          controls.update();
        },
        undefined,
        (err) => {
          console.error('加载失败:', frame.file, err);
          alert(`无法加载模型文件：${frame.file}\n请确认文件存在且文件名正确。`);
        }
      );
    }

    // ── 填充相框选择 ─────────────────────────────────────────────────────
    const modelSelect = document.getElementById('modelSelect');
    frames.forEach((frame, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = frame.name;
      modelSelect.appendChild(opt);
    });

    modelSelect.addEventListener('change', e => {
      loadFrame(parseInt(e.target.value));
    });

    // ── 从 Bambu.json 加载颜色数据 ───────────────────────────────────────
    let filaments = null;

    fetch('Bambu.json')
      .then(r => {
        if (!r.ok) throw new Error('Bambu.json 读取失败');
        return r.json();
      })
      .then(data => {
        filaments = data;

        const typeSelect = document.getElementById('typeSelect');
        typeSelect.innerHTML = '';

        Object.keys(data).forEach(type => {
          const opt = document.createElement('option');
          opt.value = type;
          opt.textContent = type;
          typeSelect.appendChild(opt);
        });

        if (typeSelect.options.length > 0) {
          typeSelect.selectedIndex = 0;
          typeSelect.dispatchEvent(new Event('change'));
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById('typeSelect').innerHTML = '<option>颜色数据加载失败</option>';
      });

    // 类型改变 → 更新颜色列表
    document.getElementById('typeSelect').addEventListener('change', () => {
      const type = document.getElementById('typeSelect').value;
      const colorSelect = document.getElementById('colorSelect');
      colorSelect.innerHTML = '';

      if (filaments && filaments[type]) {
        filaments[type].forEach(item => {
          const opt = document.createElement('option');
          opt.value = item['rgb色值'];
          opt.textContent = item['颜色'];
          colorSelect.appendChild(opt);
        });

        if (colorSelect.options.length > 0) {
          colorSelect.selectedIndex = 0;
          updateColor(colorSelect.value);
        }
      }
    });

    // 颜色改变 → 更新材质
    document.getElementById('colorSelect').addEventListener('change', e => {
      updateColor(e.target.value);
    });

    function updateColor(hex) {
      if (currentMaterial && hex) {
        currentMaterial.color.set(hex);
        currentMaterial.needsUpdate = true;
      }
    }

    // ── 窗口大小变化 ─────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── 动画循环 ─────────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // 初始加载第一个模型
    loadFrame(0);
  </script>
</body>
</html>
